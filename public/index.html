<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>CRO Audit</title>
    <meta name="shopify-api-key" content="%SHOPIFY_API_KEY%" />
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div class="container">
        <div id="result">
            <div class="loading">
                <h3>Loading your CRO audit...</h3>
                <div class="loader"></div>
            </div>
        </div>
    </div>

    <!-- Diff review modal -->
    <div id="fixModal" class="modal-overlay hidden">
        <div class="modal">
            <h3>Review AI Fix</h3>
            <p id="fixExplanation"></p>
            <div class="diff-box">
                <div class="diff-col">
                    <h4>Before</h4>
                    <pre id="fixBefore"></pre>
                </div>
                <div class="diff-col">
                    <h4>After</h4>
                    <pre id="fixAfter"></pre>
                </div>
            </div>
            <p id="fixRisk" class="risk-note"></p>
            <div class="modal-actions">
                <button id="fixCancelBtn" class="btn-secondary">Cancel</button>
                <button id="fixApplyBtn" class="btn-primary">Approve & Apply</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
